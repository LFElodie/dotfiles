- defaults:
    link:
      relink: true
      create: true
      force: true

- clean: ['~']

- shell:
  - [git submodule update --init --recursive, Installing submodules]

- link:
    ~/.tmux.conf: tmux.conf
    ~/.zshrc: zsh/zshrc
    ~/.oh-my-zsh/custom/plugins:
      glob: true
      path: zsh/custom/plugins/*
    ~/.config/nvim/init.lua: init.lua
    ~/.config/nvim/lua:
      glob: true
      path: lua/*
    ~/.config/ranger: ranger
    ~/.gitignore_global: gitignore_global
    ~/.local/share/fonts:
      glob: true
      path: font
    ~/.local/bin/obsidian-sync: obsidian/bin/obsidian-sync
    ~/.local/bin/obsidian-sync-init: obsidian/bin/obsidian-sync-init
    ~/.config/rclone/obsidian-bisync-filter.txt: obsidian/rclone/obsidian-bisync-filter.txt
    ~/.local/bin/ros2-ws-sync: ros2/bin/ros2-ws-sync
    ~/.local/bin/ros2-ws-sync-init: ros2/bin/ros2-ws-sync-init
    ~/.config/rclone/ros2-ws-bisync-filter.txt: ros2/rclone/ros2-ws-bisync-filter.txt
    ~/.config/systemd/user/obsidian-sync-on-login.service: obsidian/systemd/user/obsidian-sync-on-login.service

- shell:
  - [bash set_git.sh, Setting git]
  - [bash install_scripts/install_font.sh, Install nerd font]
  - [bash obsidian/setup_obsidian_sync.sh, Setup Obsidian sync service]
  # - [bash install_scripts/setup_mirrors.sh, Setup apt/pip mirrors]
